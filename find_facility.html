<!DOCTYPE html>

<head>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --main-blue: #0064d2; 
            --bg-gradient: linear-gradient(145deg, #006add 0%, #003a8c 100%);
            --card-white: #ffffff;
            --text-main: #1a2a3a;
            --text-sub: #7b8a99;
            --pure-white: #ffffff;
            --light-bg: #f5f7fa;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            margin: 0; padding: 0;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--pure-white);
        }

        header { padding: 40px 24px 20px; text-align: center; }
        header h1 { margin: 0; font-size: 1.4rem; font-weight: 700; letter-spacing: -0.5px; }

        .container { padding: 0 20px 50px; }

        .card {
            background: var(--card-white);
            border-radius: 24px;
            color: var(--text-main);
            margin-bottom: 20px;
            padding: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        }

        .region-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 24px;
        }
        .region-btn {
            background: var(--light-bg);
            border: none;
            border-radius: 12px;
            padding: 10px 0;
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--text-main);
            cursor: pointer;
            text-align: center;
            transition: 0.2s;
        }
        .region-btn.active {
            background: var(--main-blue);
            color: white;
            font-weight: 700;
        }

        .facility-list { 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            max-height: 380px; 
            overflow-y: auto; 
        }
        .facility-item {
            background: var(--light-bg); 
            padding: 16px; 
            border-radius: 16px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
        }
        .fac-info strong { display: block; font-size: 0.95rem; margin-bottom: 4px; color: var(--text-main); }
        .fac-info span { display: block; font-size: 0.8rem; color: var(--text-sub); line-height: 1.4; }
        .fac-call { 
            background: #fff; 
            width: 38px; height: 38px; 
            display: flex; align-items: center; justify-content: center; 
            border-radius: 50%; color: var(--main-blue); 
            text-decoration: none; box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        .count-info { font-size: 0.85rem; color: var(--text-sub); margin-bottom: 12px; padding-left: 4px; font-weight: 500; }
        .facility-list::-webkit-scrollbar { display: none; }

        .main-btn {
            display: block; background: #ffcc00; color: #1a2a3a;
            text-align: center; text-decoration: none; padding: 18px;
            border-radius: 18px; font-weight: 700; margin-top: 10px;
            font-size: 1rem; box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }
    </style>
</head>

        function filterRegion(regionName, btnElement) {
            document.querySelectorAll('.region-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');

            const filtered = centers.filter(c => c.r.includes(regionName) || c.a.includes(regionName));
            const list = document.getElementById('list');
            const count = document.getElementById('result-count');
            
            count.innerText = `총 ${filtered.length}개의 센터가 있습니다`;
            
            if(filtered.length === 0) {
                list.innerHTML = '<div style="text-align:center; padding:40px; color:#bbb; font-size:0.9rem;">데이터를 업데이트 중입니다.</div>';
                return;
            }

            list.innerHTML = filtered.map(c => `
                <div class="facility-item">
                    <div class="fac-info">
                        <strong>${c.n}</strong>
                        <span>${c.a}</span>
                    </div>
                    <a href="tel:${c.t}" class="fac-call"><i class="fa-solid fa-phone"></i></a>
                </div>
            `).join('');
            list.scrollTop = 0;
        }

        window.onload = () => {
            const initialBtn = document.querySelector('.region-btn');
            filterRegion('서울', initialBtn);
        };
    </script>
