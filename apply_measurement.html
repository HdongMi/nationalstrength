<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>체력측정 신청 - 국민체력100</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --main-blue: #0064d2; 
            --dark-blue: #004ba0;
            --bg-gradient: linear-gradient(145deg, #006add 0%, #003a8c 100%);
            --card-white: rgba(255, 255, 255, 0.98);
            --pure-white: #ffffff;
            --text-main: #1a2a3a;
            --text-sub: #5d6d7e;
            --point-blue: #eef5ff;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            margin: 0;
            padding: 0;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--pure-white);
            -webkit-font-smoothing: antialiased;
        }

        header {
            padding: 40px 24px 20px;
            text-align: center;
        }

        header h1 {
            margin: 0;
            font-size: 1.4rem;
            font-weight: 700;
        }

        .container {
            padding: 0 20px 50px;
        }

        .card {
            background: var(--card-white);
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            color: var(--text-main);
            margin-bottom: 20px;
            padding: 22px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .step-title {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--main-blue);
            margin-bottom: 18px;
            display: flex;
            align-items: center;
        }

        .step-title i { margin-right: 8px; }

        /* 1. 측정 대상 선택 버튼 */
        .type-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 15px;
        }

        .type-btn {
            background: #f1f4f8;
            border: 2px solid transparent;
            border-radius: 12px;
            padding: 18px 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            color: #777;
        }

        .type-btn.active {
            border-color: var(--main-blue);
            background: var(--point-blue);
            color: var(--main-blue);
            font-weight: 700;
        }

        .type-btn i {
            display: block;
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        /* 나이 기준 안내 문구 */
        .age-info {
            background: #f8fafd;
            border-radius: 10px;
            padding: 10px;
            text-align: center;
            font-size: 0.85rem;
            color: var(--main-blue);
            font-weight: 500;
        }

        /* 2. 온라인 신청 절차 */
        .process-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .process-item {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid #f1f4f8;
        }

        .process-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }

        .process-num {
            background: var(--main-blue);
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 700;
            margin-right: 12px;
            flex-shrink: 0;
        }

        .process-text {
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text-main);
        }

        /* 3. 측정 항목 세로 리스트 (엣지 및 그림자 완전 제거) */
        .item-list-vertical {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .item-row {
            background: #f1f4f8;
            padding: 14px 18px;
            border-radius: 12px;
            font-size: 0.95rem;
            color: var(--text-main);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: none; /* 파란색 엣지 제거 */
            box-shadow: none; /* 그림자 제거 */
            animation: slideIn 0.3s ease forwards;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 하단 준비물 및 버튼 영역 */
        .apply-footer {
            margin-top: 20px;
            text-align: center;
        }

        /* 별도 박스 없는 텍스트 기반 준비물 안내 */
        .prep-text-only {
            margin-bottom: 18px;
        }

        .prep-text-only span {
            display: block;
            color: #ffcc00;
            font-weight: 700;
            font-size: 0.95rem;
            margin-bottom: 4px;
        }

        .prep-text-only p {
            margin: 0;
            font-size: 0.88rem;
            color: var(--pure-white);
            opacity: 0.95;
            letter-spacing: -0.3px;
        }

        .main-apply-btn {
            display: block;
            background: #ffcc00;
            color: #1a2a3a;
            text-align: center;
            text-decoration: none;
            padding: 18px;
            border-radius: 15px;
            font-weight: 700;
            font-size: 1.1rem;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .notice-text {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.6);
            margin-top: 12px;
        }
    </style>
</head>
<body>

    <header>
        <h1>체력측정 신청 가이드</h1>
    </header>

    <div class="container">
        
        <div class="card">
            <div class="step-title">
                <i class="fa-solid fa-person-walking"></i> 측정 대상 선택
            </div>
            <div class="type-selector">
                <div class="type-btn active" onclick="updateContent('youth')">
                    <i class="fa-solid fa-child"></i>
                    <span>유소년/청소년</span>
                </div>
                <div class="type-btn" onclick="updateContent('adult')">
                    <i class="fa-solid fa-user-group"></i>
                    <span>성인/어르신</span>
                </div>
            </div>
            <div class="age-info" id="age-display">
                대상 연령: 만 11세 ~ 18세
            </div>
        </div>

        <div class="card">
            <div class="step-title">
                <i class="fa-solid fa-clipboard-check"></i> 온라인 신청 절차
            </div>
            <div class="process-list">
                <div class="process-item">
                    <div class="process-num">1</div>
                    <div class="process-text">홈페이지 회원가입 및 로그인</div>
                </div>
                <div class="process-item">
                    <div class="process-num">2</div>
                    <div class="process-text">가까운 체력인증센터 및 일정 선택</div>
                </div>
                <div class="process-item">
                    <div class="process-num">3</div>
                    <div class="process-text">자가 건강 문진표 작성</div>
                </div>
                <div class="process-item">
                    <div class="process-num">4</div>
                    <div class="process-text">예약 일시에 센터 방문</div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="step-title">
                <i class="fa-solid fa-heart-pulse"></i> 주요 측정 항목
            </div>
            <div class="item-list-vertical" id="item-list">
                </div>
            <p id="target-desc" style="font-size: 0.85rem; color: var(--text-sub); margin-top: 15px; line-height: 1.5;">
            </p>
        </div>

        <div class="apply-footer">
            <div class="prep-text-only">
                <span>필수 준비물</span>
                <p>신분증, 운동복, 실내용 운동화</p>
            </div>

            <a href="https://nfa.kspo.or.kr/main.kspo" class="main-apply-btn">
                공식 홈페이지 예약하기
            </a>
            <p class="notice-text">
                측정 완료 시 튼튼머니가 즉시 적립됩니다!
            </p>
        </div>
    </div>

    <script>
        const data = {
            youth: {
                age: "대상 연령: 만 11세 ~ 18세",
                items: ["근지구력 (윗몸말아올리기)", "심폐지구력 (셔틀런)", "유연성 (앉아윗몸굽히기)", "순발력 (제자리멀리뛰기)", "협응력 (눈-손 협응력)"],
                desc: "성장기 청소년은 기초 체력과 신체 발달의 균형을 중점적으로 측정합니다."
            },
            adult: {
                age: "대상 연령: 만 19세 이상 전 국민",
                items: ["근력 (상대악력)", "근지구력 (교차윗몸일으키기)", "심폐지구력 (왕복오래달리기)", "유연성 (앉아윗몸굽히기)", "순발력 (제자리높이뛰기)", "평형성 (외발서기)"],
                desc: "성인 및 어르신은 일상 건강 유지와 만성질환 예방에 필요한 핵심 체력을 측정합니다."
            }
        };

        function updateContent(type) {
            const btns = document.querySelectorAll('.type-btn');
            btns.forEach(btn => btn.classList.remove('active'));
            if(event && event.currentTarget) event.currentTarget.classList.add('active');

            document.getElementById('age-display').innerText = data[type].age;
            
            const listContainer = document.getElementById('item-list');
            const descContainer = document.getElementById('target-desc');
            
            listContainer.innerHTML = data[type].items.map((item, index) => 
                `<div class="item-row" style="animation-delay: ${index * 0.05}s">
                    <span>${item}</span>
                    <i class="fa-solid fa-check" style="color: #0064d2; font-size: 0.8rem;"></i>
                </div>`
            ).join('');
            
            descContainer.innerText = data[type].desc;
        }

        window.onload = () => updateContent('youth');
    </script>
</body>
</html>
