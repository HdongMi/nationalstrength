<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>국민체력100 튼튼머니</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            /* 1. 사용자가 제공한 이미지의 핵심 파란색 반영 */
            --main-blue: #0064d2; 
            --dark-blue: #004ba0;
            --bg-gradient: linear-gradient(145deg, #006add 0%, #003a8c 100%);
            
            /* 2. 고급스러운 화이트 톤 */
            --card-white: rgba(255, 255, 255, 0.98); /* 거의 불투명한 화이트로 눈의 피로 감소 */
            --pure-white: #ffffff;
            
            /* 3. 텍스트 및 포인트 색상 */
            --text-main: #1a2a3a;
            --text-sub: #5d6d7e;
            --accent-blue: #0056b3;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            margin: 0;
            padding: 0;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--pure-white);
            -webkit-font-smoothing: antialiased;
        }

        /* 상단 헤더 - 이미지의 곡선미 반영 */
        header {
            padding: 50px 24px 30px;
            position: relative;
        }

        header::before {
            content: "";
            position: absolute;
            top: -50px;
            right: -30px;
            width: 200px;
            height: 200px;
            background: rgba(255, 255, 255, 0.07);
            border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
            z-index: 0;
        }

        header h1 {
            margin: 0;
            font-size: 1.7rem;
            font-weight: 700;
            position: relative;
            z-index: 1;
            letter-spacing: -1px;
        }

        header p {
            margin: 8px 0 0;
            font-size: 0.95rem;
            opacity: 0.8;
            position: relative;
            z-index: 1;
        }

        .container {
            padding: 0 20px 100px;
            position: relative;
            z-index: 1;
        }

        /* 공통 카드 디자인 - 고급스러운 그림자와 라운딩 */
        .card {
            background: var(--card-white);
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            color: var(--text-main);
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* 튼튼머니 적립 알림 - 효과 제거된 깔끔한 네모 박스 */
        .alert-box {
            padding: 22px;
        }

        .alert-box .title {
            display: flex;
            align-items: center;
            font-weight: 700;
            color: var(--main-blue);
            font-size: 1.05rem;
            margin-bottom: 8px;
        }

        .alert-box .title i {
            margin-right: 8px;
        }

        .alert-box p {
            margin: 0;
            font-size: 0.92rem;
            color: var(--text-sub);
            line-height: 1.6;
        }

        /* 메뉴 그리드 */
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 25px;
        }

        .menu-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 25px 15px;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .menu-item:active {
            transform: translateY(3px);
            background: #f8f9fa;
        }

        .menu-item i {
            font-size: 2.2rem;
            color: var(--main-blue);
            margin-bottom: 12px;
        }

        .menu-item span {
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--text-main);
        }

        /* 이용 안내 섹션 */
        .info-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin: 35px 0 15px 5px;
            display: flex;
            align-items: center;
        }

        .info-title i {
            margin-right: 8px;
            color: rgba(255, 255, 255, 0.9);
        }

        .info-card {
            padding: 20px;
            margin-bottom: 15px;
        }

        .info-card strong {
            display: block;
            font-size: 1rem;
            margin-bottom: 10px;
            color: var(--main-blue);
            display: flex;
            align-items: center;
        }

        .info-card strong::before {
            content: "";
            width: 4px;
            height: 14px;
            background: var(--main-blue);
            margin-right: 8px;
            border-radius: 2px;
        }

        .info-card p {
            margin: 0;
            font-size: 0.88rem;
            color: var(--text-sub);
            line-height: 1.6;
        }

        /* 하단 네비게이션 - 깔끔한 화이트 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: var(--pure-white);
            display: flex;
            padding: 12px 0 calc(env(safe-area-inset-bottom) + 10px);
            box-shadow: 0 -5px 20px rgba(0, 0, 0, 0.1);
            z-index: 100;
        }

        .nav-item {
            flex: 1;
            text-align: center;
            text-decoration: none;
            color: #bdc3c7;
            font-size: 0.75rem;
        }

        .nav-item i {
            font-size: 1.35rem;
            display: block;
            margin-bottom: 4px;
        }

        .nav-item.active {
            color: var(--main-blue);
        }

    </style>
</head>
<body>

    <header>
        <h1>국민체력100</h1>
        <p>스포츠활동 인센티브 & 튼튼머니 가이드</p>
    </header>

    <div class="container">
        <div class="card alert-box">
            <div class="title">
                <i class="fa-solid fa-circle-info"></i>
                <span>참여 알림</span>
            </div>
            <p>지금 바로 스포츠 활동을 인증하고<br><strong>튼튼머니 50,000P</strong> 혜택을 확인하세요.</p>
        </div>

        <div class="menu-grid">
    <a href="apply_measurement.html" class="card menu-item">
        <i class="fa-solid fa-medal"></i>
        <span>체력측정 신청</span>
    </a>
    <a href="earn_points.html" class="card menu-item">
        <i class="fa-solid fa-coins"></i>
        <span>튼튼머니 적립</span>
    </a>
    <a href="find_facility.html" class="card menu-item">
        <i class="fa-solid fa-map-location-dot"></i>
        <span>지정시설 찾기</span>
    </a>
    <a href="auth_activity.html" class="card menu-item">
        <i class="fa-solid fa-qrcode"></i>
        <span>활동 인증하기</span>
    </a>
    </div>

        <div class="info-title">
            <i class="fa-solid fa-lightbulb"></i> 핵심 활용 가이드
        </div>

        <div class="card info-card">
            <strong>튼튼머니란?</strong>
            <p>국민체력100 참여를 통해 적립한 포인트를 제로페이(스포츠상품권)로 전환하여 현금처럼 사용할 수 있는 혜택입니다.</p>
        </div>

        <div class="card info-card">
            <strong>참여 혜택</strong>
            <p>체력 측정(연 1회), 스포츠 활동 인증(주 3회) 등을 통해 연간 최대 50,000원까지 적립이 가능합니다.</p>
        </div>
    </div>

</body>
</html>
